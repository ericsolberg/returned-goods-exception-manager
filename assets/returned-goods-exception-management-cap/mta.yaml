_schema-version: "3.3"
ID: returned-goods-exception-management
version: 1.0.0
description: Returned Goods Exception Management CAP application

modules:
  # ── CAP backend ────────────────────────────────────────────────────────
  - name: returned-goods-exception-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      build-result: .
      ignore:
        - node_modules/
        - .env
    properties:
      NODE_ENV: production
    requires:
      - name: returned-goods-exception-management-uaa
      - name: returned-goods-exception-management-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ── HTML5 content deployer (uploads zip to html5-host) ────────────────
  - name: returned-goods-exception-management-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: returned-goods-exception-management-html5-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources

  # ── Destinations deployer (registers html5-repo + uaa for Work Zone) ──
  - name: returned-goods-exception-management-destinations
    type: com.sap.application.content
    requires:
      - name: returned-goods-exception-management-uaa
        parameters:
          service-key:
            name: returned-goods-exception-management-uaa-key
      - name: returned-goods-exception-management-html5-host
        parameters:
          service-key:
            name: returned-goods-exception-management-html5-host-key
      - name: returned-goods-exception-management-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: returned-goods-exception-management-html5-repo
              ServiceInstanceName: returned-goods-exception-management-html5-host
              ServiceKeyName: returned-goods-exception-management-html5-host-key
              sap.cloud.service: returnedgoodsexceptionmanagement.service
            - Name: returned-goods-exception-management-uaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: returned-goods-exception-management-uaa
              ServiceKeyName: returned-goods-exception-management-uaa-key
              sap.cloud.service: returnedgoodsexceptionmanagement.service

resources:
  # ── XSUAA ──────────────────────────────────────────────────────────────
  - name: returned-goods-exception-management-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: returned-goods-exception-management
        tenant-mode: dedicated

  # ── Destination service ─────────────────────────────────────────────────
  - name: returned-goods-exception-management-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          subaccount:
            existing_destinations_policy: update
            destinations:
              - Name: returned-goods-exception-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true

  # ── HTML5 Application Repository (app-host) ────────────────────────────
  - name: returned-goods-exception-management-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npm run build
        - npm run build:ui
