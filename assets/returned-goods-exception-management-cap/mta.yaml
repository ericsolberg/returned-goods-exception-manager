_schema-version: "3.3"
ID: returned-goods-exception-management
version: 1.0.0
description: Returned Goods Exception Management CAP application

modules:
  - name: returned-goods-exception-management-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 128M
      disk-quota: 256M
    requires:
      - name: returned-goods-exception-management-uaa
      - name: srv-api
        group: destinations
        properties:
          name: cap-backend
          url: ~{srv-url}
          forwardAuthToken: true

  - name: returned-goods-exception-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      build-result: .
      ignore:
        - node_modules/
        - .env
    properties:
      NODE_ENV: production
    requires:
      - name: returned-goods-exception-management-uaa
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

resources:
  - name: returned-goods-exception-management-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: returned-goods-exception-management
        tenant-mode: dedicated

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npm run build
        - cp app/index.html approuter/resources/index.html
        - cp app/tapestry-logo.png approuter/resources/tapestry-logo.png
