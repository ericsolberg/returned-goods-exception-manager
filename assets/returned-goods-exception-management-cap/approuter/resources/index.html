<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Returned Goods Exception Management</title>
  <script id="sap-ui-bootstrap"
    src="https://sdk.openui5.org/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.ui.layout"
    data-sap-ui-async="true"
    data-sap-ui-compatversion="edge"
    data-sap-ui-oninit="onUI5Init">
  </script>
  <script>
    function onUI5Init() {
    sap.ui.require([
      "sap/m/App",
      "sap/m/Page",
      "sap/m/Bar",
      "sap/m/Title",
      "sap/m/Button",
      "sap/m/Panel",
      "sap/m/VBox",
      "sap/m/HBox",
      "sap/m/Text",
      "sap/m/Label",
      "sap/m/ObjectStatus",
      "sap/m/ColumnListItem",
      "sap/m/Column",
      "sap/m/Table",
      "sap/m/Dialog",
      "sap/m/Input",
      "sap/m/TextArea",
      "sap/m/Select",
      "sap/ui/core/Item",
      "sap/m/IconTabBar",
      "sap/m/IconTabFilter",
      "sap/m/MessageStrip",
      "sap/m/ToolbarSpacer",
      "sap/m/Toolbar",
      "sap/ui/model/json/JSONModel",
      "sap/ui/core/mvc/XMLView",
      "sap/m/FlexItemData",
    ], function(
      App, Page, Bar, Title, Button, Panel, VBox, HBox, MText, Label,
      ObjectStatus, ColumnListItem, Column, MTable, Dialog, Input, TextArea,
      Select, Item, IconTabBar, IconTabFilter, MessageStrip, ToolbarSpacer,
      Toolbar, JSONModel, XMLView, FlexItemData
    ) {

      /* ── OData helper ─────────────────────────────────────────────────── */
      const BASE = "/exception";
      async function odata(path, opts = {}) {
        const res = await fetch(BASE + path, {
          ...opts,
          headers: { "Content-Type": "application/json", ...opts.headers },
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err?.error?.message || res.statusText);
        }
        return res.status === 204 ? null : res.json();
      }

      /* ── Status helpers ───────────────────────────────────────────────── */
      function statusState(code) {
        const map = {
          MATCHED:            "Warning",
          AMBIGUOUS:          "Warning",
          UNMATCHED:          "Error",
          RESOLVED_CONFIRMED: "Success",
          RESOLVED_REJECTED:  "None",
          RESOLVED_LINKED:    "Success",
          PENDING_SIGNAL:     "None",
        };
        return map[code] || "None";
      }
      function statusText(code) {
        const map = {
          MATCHED:            "Matched",
          AMBIGUOUS:          "Ambiguous",
          UNMATCHED:          "Unmatched",
          RESOLVED_CONFIRMED: "Confirmed",
          RESOLVED_REJECTED:  "Rejected",
          RESOLVED_LINKED:    "Linked",
          PENDING_SIGNAL:     "Pending Signal",
        };
        return map[code] || code || "—";
      }
      function signalState(code) {
        return code === "SENT" ? "Success" : code === "FAILED" ? "Error" : "None";
      }

      /* ── Models ───────────────────────────────────────────────────────── */
      const listModel    = new JSONModel({ orders: [], loading: false });
      const detailModel  = new JSONModel({ order: null, expected: [], received: [], history: [], detailTab: "items" });
      const bannerModel  = new JSONModel({ msg: "", type: "Information", visible: false });

      /* ── Banner helpers ───────────────────────────────────────────────── */
      let bannerTimer = null;
      function showBanner(msg, type) {
        clearTimeout(bannerTimer);
        bannerModel.setData({ msg, type, visible: true });
        if (type === "Success") bannerTimer = setTimeout(() => bannerModel.setData({ msg: "", type: "Information", visible: false }), 3000);
      }

      /* ── Load worklist ───────────────────────────────────────────────── */
      async function loadList() {
        listModel.setProperty("/loading", true);
        try {
          const d = await odata("/ReturnOrders?$orderby=createdAt desc&$select=ID,externalOrderRef,customerRef,receivedDate,status_code,signalStatus");
          listModel.setProperty("/orders", d.value);
        } catch (e) {
          showBanner(e.message, "Error");
        } finally {
          listModel.setProperty("/loading", false);
        }
      }

      /* ── Load detail ─────────────────────────────────────────────────── */
      async function loadDetail(id) {
        try {
          const [o, exp, rec, hist] = await Promise.all([
            odata(`/ReturnOrders(${id})`),
            odata(`/ReturnOrders(${id})/expectedItems`),
            odata(`/ReturnOrders(${id})/receivedItems`),
            odata(`/ReturnOrders(${id})/auditHistory?$orderby=createdAt desc`),
          ]);
          detailModel.setData({ order: o, expected: exp.value, received: rec.value, history: hist.value, detailTab: "items" });
        } catch (e) {
          showBanner(e.message, "Error");
        }
      }

      /* ── Call action ─────────────────────────────────────────────────── */
      async function callAction(action, body = {}) {
        const id = detailModel.getProperty("/order/ID");
        try {
          await odata(`/ReturnOrders(${id})/ExceptionService.${action}`, {
            method: "POST",
            body: JSON.stringify(body),
          });
          showBanner(`${action} completed successfully`, "Success");
          await loadDetail(id);
          await loadList();
        } catch (e) {
          showBanner(e.message, "Error");
        }
      }

      /* ══════════════════════════════════════════════════════════════════
         DIALOGS
      ══════════════════════════════════════════════════════════════════ */

      /* ── Escalate ── */
      const escalateReasonInput = new TextArea({ width: "100%", placeholder: "Describe the ambiguity…", rows: 3 });
      const escalateDialog = new Dialog({
        title: "Escalate Order",
        content: [
          new Label({ text: "Reason", required: true }),
          escalateReasonInput,
        ],
        beginButton: new Button({
          text: "Cancel", type: "Default",
          press: () => escalateDialog.close(),
        }),
        endButton: new Button({
          text: "Escalate", type: "Emphasized",
          press: async () => {
            escalateDialog.close();
            await callAction("escalate", { reason: escalateReasonInput.getValue() });
          },
        }),
      });

      /* ── Resolve ── */
      const resolveDecisionSelect = new Select({
        items: [
          new Item({ key: "ACCEPT", text: "Accept" }),
          new Item({ key: "REJECT", text: "Reject" }),
        ],
      });
      const resolveReasonInput = new TextArea({ width: "100%", placeholder: "Resolution reason…", rows: 3 });
      const resolveDialog = new Dialog({
        title: "Resolve Order",
        content: [
          new Label({ text: "Decision", required: true }),
          resolveDecisionSelect,
          new Label({ text: "Reason", required: true }),
          resolveReasonInput,
        ],
        beginButton: new Button({
          text: "Cancel", type: "Default",
          press: () => resolveDialog.close(),
        }),
        endButton: new Button({
          text: "Confirm", type: "Emphasized",
          press: async () => {
            resolveDialog.close();
            await callAction("resolve", {
              decision: resolveDecisionSelect.getSelectedKey(),
              reason: resolveReasonInput.getValue(),
            });
          },
        }),
      });

      /* ── Reject ── */
      const rejectReasonInput = new TextArea({ width: "100%", placeholder: "Rejection reason…", rows: 3 });
      const rejectDialog = new Dialog({
        title: "Reject Order",
        content: [
          new Label({ text: "Reason", required: true }),
          rejectReasonInput,
        ],
        beginButton: new Button({
          text: "Cancel", type: "Default",
          press: () => rejectDialog.close(),
        }),
        endButton: new Button({
          text: "Reject", type: "Reject",
          press: async () => {
            rejectDialog.close();
            await callAction("reject", { reason: rejectReasonInput.getValue() });
          },
        }),
      });

      /* ── Link Order ── */
      const linkOrderIdInput = new Input({ width: "100%", placeholder: "SO-2024-XXXXX" });
      const linkReasonInput  = new TextArea({ width: "100%", placeholder: "Optional reason…", rows: 3 });
      const linkDialog = new Dialog({
        title: "Link to Sales Order",
        content: [
          new Label({ text: "Sales Order ID", required: true }),
          linkOrderIdInput,
          new Label({ text: "Reason" }),
          linkReasonInput,
        ],
        beginButton: new Button({
          text: "Cancel", type: "Default",
          press: () => linkDialog.close(),
        }),
        endButton: new Button({
          text: "Link", type: "Emphasized",
          press: async () => {
            linkDialog.close();
            await callAction("linkOrder", {
              linkedOrderId: linkOrderIdInput.getValue(),
              reason: linkReasonInput.getValue(),
            });
          },
        }),
      });

      /* ══════════════════════════════════════════════════════════════════
         BANNER
      ══════════════════════════════════════════════════════════════════ */
      const bannerStrip = new MessageStrip({
        showIcon: true,
        showCloseButton: true,
        visible: false,
        close: () => bannerModel.setData({ msg: "", type: "Information", visible: false }),
      }).addStyleClass("sapUiSmallMarginBottom");
      bannerStrip.setModel(bannerModel);
      bannerStrip.bindProperty("text",    "/msg");
      bannerStrip.bindProperty("type",    "/type");
      bannerStrip.bindProperty("visible", "/visible");

      /* ══════════════════════════════════════════════════════════════════
         WORKLIST PAGE
      ══════════════════════════════════════════════════════════════════ */
      const worklist = new MTable({
        growing: true,
        growingThreshold: 20,
        mode: "SingleSelectMaster",
        selectionChange: async (evt) => {
          const item = evt.getParameter("listItem");
          const ctx  = item.getBindingContext("list");
          const id   = ctx.getProperty("ID");
          await loadDetail(id);
          app.to("detailPage");
        },
        columns: [
          new Column({ header: new Label({ text: "External Order Ref" }), width: "16rem" }),
          new Column({ header: new Label({ text: "Customer Ref" }),        width: "12rem" }),
          new Column({ header: new Label({ text: "Received Date" }),       width: "10rem" }),
          new Column({ header: new Label({ text: "Status" }),              width: "11rem" }),
          new Column({ header: new Label({ text: "Signal Status" }),       width: "9rem"  }),
        ],
      });

      worklist.setModel(listModel, "list");
      worklist.bindItems({
        model: "list",
        path: "/orders",
        template: new ColumnListItem({
          cells: [
            new MText({ text: "{list>externalOrderRef}" }),
            new MText({ text: "{list>customerRef}" }),
            new MText({ text: "{list>receivedDate}" }),
            new ObjectStatus({
              text:  { path: "list>status_code", formatter: statusText  },
              state: { path: "list>status_code", formatter: statusState },
            }),
            new ObjectStatus({
              text:  { path: "list>signalStatus", formatter: v => v || "—" },
              state: { path: "list>signalStatus", formatter: signalState },
            }),
          ],
        }),
      });

      const listPage = new Page({
        id: "listPage",
        title: "Returned Goods Exception Management",
        headerContent: [
          new Button({ icon: "sap-icon://refresh", press: loadList }),
        ],
        content: [bannerStrip, worklist],
      });

      /* ══════════════════════════════════════════════════════════════════
         DETAIL PAGE
      ══════════════════════════════════════════════════════════════════ */

      /* ── Action toolbar (bound dynamically) ── */
      const confirmBtn    = new Button({ text: "Confirm",      type: "Emphasized",    press: () => callAction("confirm") });
      const escalateBtn   = new Button({ text: "Escalate",     type: "Default",       press: () => { escalateReasonInput.setValue(""); escalateDialog.open(); } });
      const resolveBtn    = new Button({ text: "Resolve",      type: "Emphasized",    press: () => { resolveReasonInput.setValue(""); resolveDialog.open(); } });
      const rejectBtn     = new Button({ text: "Reject",       type: "Reject",        press: () => { rejectReasonInput.setValue(""); rejectDialog.open(); } });
      const linkBtn       = new Button({ text: "Link Order",   type: "Default",       press: () => { linkOrderIdInput.setValue(""); linkReasonInput.setValue(""); linkDialog.open(); } });
      const retryBtn      = new Button({ text: "Retry Signal", type: "Default",       press: () => callAction("retrySignal") });

      /* Show/hide based on status */
      function refreshActionButtons() {
        const order = detailModel.getProperty("/order");
        const status = order?.status_code;
        const signal = order?.signalStatus;
        confirmBtn .setVisible(status === "MATCHED");
        escalateBtn.setVisible(status === "MATCHED");
        resolveBtn .setVisible(status === "AMBIGUOUS");
        rejectBtn  .setVisible(status === "AMBIGUOUS" || status === "UNMATCHED");
        linkBtn    .setVisible(status === "UNMATCHED");
        retryBtn   .setVisible(signal === "FAILED");
      }
      detailModel.attachPropertyChange(refreshActionButtons);

      const actionToolbar = new Toolbar({
        content: [
          confirmBtn, escalateBtn, resolveBtn, rejectBtn, linkBtn, retryBtn,
          new ToolbarSpacer(),
        ],
      });

      /* ── Header form ── */
      function detailField(label, path) {
        const box = new VBox({ width: "16rem" });
        const lbl = new Label({ text: label });
        const val = new MText();
        val.bindProperty("text", { model: "detail", path, formatter: v => v || "—" });
        box.addItem(lbl);
        box.addItem(val);
        return box;
      }

      const headerForm = new HBox({
        wrap: "Wrap",
        renderType: "Bare",
        items: [
          detailField("External Order Ref", "/order/externalOrderRef"),
          detailField("Customer Ref",       "/order/customerRef"),
          detailField("Received Date",      "/order/receivedDate"),
          detailField("Linked Order ID",    "/order/linkedOrderId"),
          detailField("Notes",              "/order/notes"),
          detailField("Created By",         "/order/createdBy"),
        ],
      }).addStyleClass("sapUiSmallMarginBottom");

      const statusDisplay = new ObjectStatus({
        title: "Status",
      });
      statusDisplay.setModel(detailModel, "detail");
      statusDisplay.bindProperty("text",  { model: "detail", path: "/order/status_code",  formatter: statusText  });
      statusDisplay.bindProperty("state", { model: "detail", path: "/order/status_code",  formatter: statusState });

      const signalDisplay = new ObjectStatus({ title: "Signal" });
      signalDisplay.setModel(detailModel, "detail");
      signalDisplay.bindProperty("text",  { model: "detail", path: "/order/signalStatus", formatter: v => v || "—" });
      signalDisplay.bindProperty("state", { model: "detail", path: "/order/signalStatus", formatter: signalState });

      const headerStatusBar = new HBox({
        items: [statusDisplay, signalDisplay],
        renderType: "Bare",
      }).addStyleClass("sapUiSmallMarginBottom");
      headerStatusBar.setModel(detailModel, "detail");

      /* ── Expected Items table ── */
      const expectedTable = new MTable({
        headerText: "Expected Items",
        columns: [
          new Column({ header: new Label({ text: "Material ID" }),    width: "9rem"  }),
          new Column({ header: new Label({ text: "Description" }),    width: "auto"  }),
          new Column({ header: new Label({ text: "Qty" }),            width: "6rem", hAlign: "End" }),
          new Column({ header: new Label({ text: "Unit" }),           width: "5rem"  }),
        ],
      });
      expectedTable.setModel(detailModel, "detail");
      expectedTable.bindItems({
        model: "detail", path: "/expected",
        template: new ColumnListItem({
          cells: [
            new MText({ text: "{detail>materialId}" }),
            new MText({ text: "{detail>materialDescription}" }),
            new MText({ text: "{detail>expectedQty}" }),
            new MText({ text: "{detail>unit}" }),
          ],
        }),
      });

      /* ── Received Items table ── */
      const receivedTable = new MTable({
        headerText: "Received Items",
        columns: [
          new Column({ header: new Label({ text: "Material ID" }),    width: "9rem"  }),
          new Column({ header: new Label({ text: "Description" }),    width: "auto"  }),
          new Column({ header: new Label({ text: "Qty" }),            width: "6rem", hAlign: "End" }),
          new Column({ header: new Label({ text: "Unit" }),           width: "5rem"  }),
          new Column({ header: new Label({ text: "Condition" }),      width: "8rem"  }),
        ],
      });
      receivedTable.setModel(detailModel, "detail");
      receivedTable.bindItems({
        model: "detail", path: "/received",
        template: new ColumnListItem({
          cells: [
            new MText({ text: "{detail>materialId}" }),
            new MText({ text: "{detail>materialDescription}" }),
            new MText({ text: "{detail>receivedQty}" }),
            new MText({ text: "{detail>unit}" }),
            new MText({ text: "{detail>condition}" }),
          ],
        }),
      });

      /* ── Audit History table ── */
      const historyTable = new MTable({
        headerText: "Audit History",
        columns: [
          new Column({ header: new Label({ text: "Timestamp" }),  width: "14rem" }),
          new Column({ header: new Label({ text: "User" }),        width: "14rem" }),
          new Column({ header: new Label({ text: "Action" }),      width: "12rem" }),
          new Column({ header: new Label({ text: "Reason" }),      width: "auto"  }),
        ],
      });
      historyTable.setModel(detailModel, "detail");
      historyTable.bindItems({
        model: "detail", path: "/history",
        template: new ColumnListItem({
          cells: [
            new MText({ text: { path: "detail>createdAt", formatter: v => v ? new Date(v).toLocaleString() : "—" } }),
            new MText({ text: { path: "detail>userId",    formatter: v => v || "—" } }),
            new MText({ text: "{detail>action}" }),
            new MText({ text: { path: "detail>reason",   formatter: v => v || "—" } }),
          ],
        }),
      });

      /* ── IconTabBar ── */
      const tabBar = new IconTabBar({
        items: [
          new IconTabFilter({ text: "Items",   key: "items",   content: [
            new HBox({ renderType: "Bare", wrap: "Wrap", items: [expectedTable, receivedTable] }),
          ]}),
          new IconTabFilter({ text: "History", key: "history", content: [historyTable] }),
        ],
      });

      const detailBanner = new MessageStrip({
        showIcon: true,
        showCloseButton: true,
        visible: false,
        close: () => bannerModel.setData({ msg: "", type: "Information", visible: false }),
      }).addStyleClass("sapUiSmallMarginBottom");
      detailBanner.setModel(bannerModel);
      detailBanner.bindProperty("text",    "/msg");
      detailBanner.bindProperty("type",    "/type");
      detailBanner.bindProperty("visible", "/visible");

      const detailPage = new Page({
        id: "detailPage",
        showNavButton: true,
        navButtonPress: () => { app.back(); bannerModel.setData({ msg: "", type: "Information", visible: false }); },
        title: "Order Detail",
        content: [
          detailBanner,
          headerStatusBar,
          headerForm,
          actionToolbar,
          tabBar,
        ],
      });
      detailPage.setModel(detailModel, "detail");

      /* ══════════════════════════════════════════════════════════════════
         APP SHELL
      ══════════════════════════════════════════════════════════════════ */
      const app = new App({
        pages: [listPage, detailPage],
      });

      app.placeAt("content");
      loadList();
    });   // sap.ui.require callback
    }     // onUI5Init
  </script>
</head>
<body class="sapUiBody">
  <div id="content"></div>
</body>
</html>
