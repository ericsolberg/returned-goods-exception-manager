apiVersion: asset.sap/v1
kind: Asset

type: base-ui

metadata:
  id: {{placeholder-id}}
  name: {{application-name}}

probes:
  startup:
    path: /health
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18  # 18 × 5s = 90 seconds for startup
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3  
  
container:
  buildPath: gen/srv
  port: 4004
  env:
    PORT: "4004"
