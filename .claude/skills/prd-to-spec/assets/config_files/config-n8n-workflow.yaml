schema: spec-driven

context: |
  Tech stack: n8n workflow automation
  Purpose: Build workflow automations using n8n per product-requirements-document.md requirements.

  Skills: You MUST use the `n8n-workflow` skill for all workflow creation and editing tasks.
  
  Key constraints:
  - NEVER use MCP to create or update workflows — only for node discovery and deletion.
  - Write *.n8n.json files to the filesystem in `assets/n8n/workflows/`.
  - If the solution also requires a CAP application, create CAP FIRST before any n8n workflow.
  - `connections` in the JSON reference nodes by `name`, not `id`.

rules:
  proposal:
    - You MUST read the `n8n-workflow` skill before creating the proposal to understand the patterns for the workflow
    - Ensure all tasks align with the `n8n-workflow` skill
    - Only create tasks fulfillable by the agent (no human tasks)
  tasks:
    - First task MUST be to re-read product-requirements-document.md
    - All tasks must be agent-executable (no human intervention)
    - Implement ALL tasks from tasks.md — never stop after partial implementation
